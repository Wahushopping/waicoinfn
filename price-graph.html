<!DOCTYPE html>
<html>
<head>
<title>Coin Price Graph</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    background:#0f172a;
    color:white;
    font-family:Segoe UI;
    text-align:center;
}
.container{
    max-width:900px;
    margin:40px auto;
}
button{
    padding:8px 12px;
    margin:5px;
    background:#1e293b;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    background:#22c55e;
    color:black;
}
canvas{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
}
/* 🔥 FOOTER STYLE */
.footer{
    background:#0b1220;
    margin-top:60px;
    padding:40px 5% 20px;
    color:#9ca3af;
}

.footer-container{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:30px;
}

.footer-logo h3{
    color:white;
    margin-bottom:8px;
}

.footer-links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.footer-links a{
    color:#9ca3af;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.footer-links a:hover{
    color:#22c55e;
}

.footer-bottom{
    margin-top:30px;
    text-align:center;
    font-size:13px;
    border-top:1px solid #1f2937;
    padding-top:15px;
}
</style>
</head>
<body>

<div class="container">

<h2>Coin Price History</h2>
<div>
    <button onclick="loadGraph('3d')">3 Days</button>
    <button onclick="loadGraph('7d')">7 Days</button>
    <button onclick="loadGraph('1m')">1 Month</button>
    <button onclick="loadGraph('3m')">3 Months</button>
    <button onclick="loadGraph('6m')">6 Months</button>
    <button onclick="loadGraph('1y')">1 Year</button>
    <button onclick="loadGraph('all')">All</button>
</div>

<canvas id="priceChart"></canvas>

</div>
<footer class="footer">

    <div class="footer-container">

        <div class="footer-logo">
            <h3>Wai Crypto</h3>
            <p>Secure • Transparent • Profitable</p>
        </div>

        <div class="footer-links">
            <a href="https://t.me/yourchannel" target="_blank">Telegram Channel</a>
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact Us</a>
        </div>

    </div>

    <div class="footer-bottom">
        © 2025 Wai Crypto. All Rights Reserved.
    </div>

</footer>
<script>

let chart;
function loadGraph(range){

    fetch(`http://localhost:3000/price-history/${range}`)
    .then(res=>res.json())
    .then(data=>{

        if(data.length === 0){
            alert("No price data available");
            return;
        }

        const labels = data.map(d =>
            new Date(d.date).toLocaleDateString()
        );

        const prices = data.map(d => d.price);

        const firstPrice = prices[0];
        const lastPrice = prices[prices.length - 1];

        const isUp = lastPrice >= firstPrice;

        const borderColor = isUp ? "#22c55e" : "#ef4444";
        const bgColor = isUp ? "rgba(34,197,94,0.2)" : "rgba(239,68,68,0.2)";

        if(chart) chart.destroy();

        chart = new Chart(
            document.getElementById("priceChart"),
            {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Coin Price",
                        data: prices,
                        borderColor: borderColor,
                        backgroundColor: bgColor,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options:{
                    responsive:true,
                    plugins:{
                        legend:{
                            labels:{ color:"white" }
                        }
                    },
                    scales:{
                        x:{
                            ticks:{ color:"white" }
                        },
                        y:{
                            ticks:{ color:"white" }
                        }
                    }
                }
            }
        );

    });
}

loadGraph("3d");


</script>

</body>
</html>
