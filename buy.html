<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buy Coins</title>
<style>
body{background:#0f172a;color:white;font-family:Segoe UI;}
.container{max-width:800px;margin:40px auto;background:#1e293b;padding:30px;border-radius:12px;}
.order{border-bottom:1px solid gray;padding:10px 0;}
input{padding:5px;width:100px;}
button{padding:5px;}
/* 🔥 FOOTER STYLE */
.footer{
    background:#0b1220;
    margin-top:60px;
    padding:40px 5% 20px;
    color:#9ca3af;
}

.footer-container{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:30px;
}

.footer-logo h3{
    color:white;
    margin-bottom:8px;
}

.footer-links{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.footer-links a{
    color:#9ca3af;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.footer-links a:hover{
    color:#22c55e;
}

.footer-bottom{
    margin-top:30px;
    text-align:center;
    font-size:13px;
    border-top:1px solid #1f2937;
    padding-top:15px;
}
.top-bar{
    background:#111827;
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:bold;
    font-size:18px;
}
/* 🔥 TOP BAR FIX */
.nav-links{
    display:flex;
    gap:20px;
}

.nav-item{
    position:relative;
}

.nav-btn{
    text-decoration:none;
    color:white;
    padding:8px 16px;
    background:#1f2937;
    border-radius:8px;
    transition:0.3s;
    font-size:14px;
}

.nav-btn:hover{
    background:#22c55e;
    color:black;
}

.balance{
    color:#22c55e;
    font-weight:bold;
}

/* 🔥 3 DOT MENU STYLE */
.menu-wrapper{
    position:relative;
}

.menu-icon{
    font-size:22px;
    cursor:pointer;
    padding:6px 10px;
    border-radius:6px;
    transition:0.3s;
}

.menu-icon:hover{
    background:#1f2937;
}

.dropdown-menu{
    position:absolute;
    right:0;
    top:35px;
    background:#1e293b;
    border-radius:8px;
    display:none;
    flex-direction:column;
    min-width:120px;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
    overflow:hidden;
    z-index:100;
}

.dropdown-menu button{
    background:none;
    border:none;
    color:white;
    padding:12px;
    text-align:left;
    cursor:pointer;
    width:100%;
}

.dropdown-menu button:hover{
    background:#ef4444;
}
/* 🔥 MARKET CARD STYLE */
.order{
    background:#0f172a;
    border:1px solid #2a2f3a;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

.order:hover{
    border-color:#22c55e;
    transform:translateY(-2px);
}

/* Seller Info */
.seller-name{
    font-size:16px;
    font-weight:bold;
}

.status-badge{
    font-size:12px;
    margin-left:8px;
}

.status-online{
    color:#22c55e;
}

.status-offline{
    color:gray;
}

/* Price text */
.price-text{
    margin-top:6px;
    color:#9ca3af;
    font-size:14px;
}

/* Message Button */
.message-btn{
    padding:10px 18px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    position:relative;
}

.message-btn:hover{
    background:#16a34a;
}

/* Unread badge */
.unread-dot{
    position:absolute;
    top:-6px;
    right:-6px;
    background:#ef4444;
    color:white;
    width:20px;
    height:20px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
}
</style>
</head>

<body>
<div class="top-bar">
    <div class="logo">Wai Coins </div>

    

    <div style="display:flex; align-items:center; gap:20px;">
        <div class="balance" id="balanceDisplay">Balance: ₹0</div>

        <!-- 🔥 3 DOT MENU -->
        <div class="menu-wrapper">
            <div class="menu-icon" onclick="toggleMenu()">⋮</div>

            <div class="dropdown-menu" id="dropdownMenu">
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</div>
<div class="top-bar">
    <div class="nav-links">
        <div class="nav-item">
            <a href="index.html" class="nav-btn">Dashboard</a>
        </div>

        <div class="nav-item">
            <a href="sell.html" class="nav-btn" style="background:#fd1e43;">Sell Coins</a>
        </div>
    </div>
</div>
<div class="container">

<h2>Buy Coins Marketplace</h2>

<div id="marketList"></div>

</div>
<footer class="footer">

    <div class="footer-container">

        <div class="footer-logo">
            <h3>Wai Coins</h3>
            <p>Secure • Transparent • Profitable</p>
        </div>

        <div class="footer-links">
            <a href="https://t.me/yourchannel" target="_blank">Telegram Channel</a>
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact Us</a>
        </div>

    </div>

    <div class="footer-bottom">
        © 2025 Wai Coins. All Rights Reserved.
    </div>

</footer>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>

const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}

// 🔐 Parse JWT
function parseJwt(token) {
    return JSON.parse(atob(token.split('.')[1]));
}

const myUserId = parseJwt(token).userId;

// 🔥 CONNECT SOCKET AFTER USER ID READY
const socket = io("https://waicoinbn.onrender.com");

socket.emit("join", myUserId);

// 🔄 Reload market when online list updates
socket.on("onlineUsers", () => {
    loadMarket();
});

loadMarket();
loadBalance();


// ================= MARKET =================
function loadMarket(){

    fetch("https://waicoinbn.onrender.com/sell/all",{
        headers:{ Authorization:"Bearer "+token }
    })
    .then(res=>res.json())
    .then(data=>{

        let html="";

        const filtered = data.filter(order => 
            order.userId._id !== myUserId
        );

        if(filtered.length === 0){
            html = "<p>No sellers available.</p>";
        }

        filtered.forEach(order=>{

            html += `
<div class="order">

    <div>
        <div class="seller-name">
            ${order.userId.username}

            <span class="status-badge 
                ${order.isOnline ? 'status-online' : 'status-offline'}">
                ● ${order.isOnline ? "Online" : "Offline"}
            </span>
        </div>

        <div class="price-text">
            Price per Coin: ₹${order.pricePerCoin}
        </div>
    </div>

    <div style="position:relative;">
        <button class="message-btn"
            onclick="openMessage('${order.userId._id}')">
            Message

            ${order.unreadCount > 0 
                ? `<span class="unread-dot">${order.unreadCount}</span>` 
                : ""
            }
        </button>
    </div>

</div>
`;
        });

        document.getElementById("marketList").innerHTML = html;

    });
}


// ================= BALANCE =================
function loadBalance(){
    fetch("https://waicoinbn.onrender.com/my-coins",{
        headers:{ Authorization:"Bearer "+token }
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("balanceDisplay").innerText =
            "Coins: " + (data.coins || 0);
    });
}


// ================= DROPDOWN =================
function toggleMenu(){
    const menu = document.getElementById("dropdownMenu");
    menu.style.display =
        menu.style.display === "flex" ? "none" : "flex";
}

function logout(){
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

window.onclick = function(event){
    if(!event.target.closest('.menu-wrapper')){
        const menu = document.getElementById("dropdownMenu");
        if(menu) menu.style.display = "none";
    }
}


// ================= OPEN CHAT =================
function openMessage(userId){
    window.location.href = "message.html?seller=" + userId;
}


// 🔁 Auto refresh every 5 sec
setInterval(loadMarket, 5000);

</script>

</body>

</html>
